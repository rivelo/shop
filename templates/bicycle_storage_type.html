<!DOCTYPE html>
<html lang="uk">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta charset="UTF-8">
    <title>Додати вид зберігання велосипедів</title>
</head>

<body class="bg-light">

<div class="container-fluid py-4">
    <div class="row justify-content-center justify-content-lg-start">
        <div class="col-12 col-md-10 col-lg-7 ml-lg-4"> 
            
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">Вид зберігання</h5>
                </div>
                
                <div class="card-body p-4">
                    <form method="post" novalidate id="managerForm">
                        {% csrf_token %}
                        
                        <!-- Виводимо всі поля в одну колонку -->
                        {% for field in form %}
                        <div class="form-group mb-4">
                            <label class="font-weight-bold {% if field.errors %}text-danger{% endif %}">
                                {{ field.label }}
                            </label>
                            
                            {# Додаємо клас is-invalid вручну через Django фільтр або перевірку #}
                            <div class="{% if field.errors %}is-invalid-wrapper{% endif %}">
                                {{ field }}
                            </div>

                            {% if field.errors %}
                                {% for error in field.errors %}
                                    <div class="invalid-feedback font-weight-bold">
                                        {{ error }}
                                    </div>
                                {% endfor %}
                            {% endif %}
                        </div>
                        {% endfor %}

                        <div class="mt-4 pt-3 border-top d-flex align-items-center">
                            <button type="submit" class="btn btn-primary px-5 shadow-sm mr-3">Зберегти</button>
                        </div>
                    </form>
                </div>
            </div>
            
        </div>
    </div>
</div>

<script>
    // JS для динамічного додавання класу помилки до самих полів вводу
    document.addEventListener('DOMContentLoaded', function() {
        const errorFields = document.querySelectorAll('.invalid-feedback');
        errorFields.forEach(error => {
            const input = error.parentElement.querySelector('input, select, textarea');
            if (input) {
                input.classList.add('is-invalid');
            }
        });

        // Автофокус
        //const nameField = document.querySelector('input[name="name"]');
        const nameField = document.getElementById('id_type');
        if (nameField) nameField.focus();
    });
</script>

</body>
</html>
