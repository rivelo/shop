<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Зберігання велосипедів</title>

    <style>
        body { background-color: #f4f7f6; padding: 0px; }
        .form-card { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            padding: 30px;
            width: 100%;
        }
        /* Стилізація полів Django на всю ширину */
        .form-card input, .form-card select, .form-card textarea {
            display: block;
            width: 100% !important;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        /* Стилізація прев'ю фото */
        #preview img {
            height: 120px;
            margin: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            object-fit: cover;
        }
        .btn-save { padding: 12px 50px; font-weight: bold; font-size: 1.1rem; }
        
        /* Адаптивність вирівнювання */
        @media (min-width: 992px) {
            .form-col { padding-left: 2rem; }
            .form-card { max-width: 850px; }
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row justify-content-center justify-content-lg-start">
        <div class="col-12 col-md-10 col-lg-9 form-col">
            
            <div class="form-card">
                <h2 class="mb-4 text-primary font-weight-bold">{{ text }}</h2>
                
                <form id="UserEnter" action="." method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div id="django-form-wrapper">
                        <!-- Django form.as_p або as_ul виведеться тут -->
                        {{ form.as_p }}
                    </div>

                    <hr class="my-4">

                    <div class="form-group">
                        <label class="font-weight-bold">Додати фото (можна вибрати декілька):</label>
                        <div class="custom-file mb-3">
                            <input type="file" name="file-input" id="file-input" class="custom-file-input" multiple>
                            <label class="custom-file-label" for="file-input">Виберіть файли...</label>
                        </div>
                        <div id="preview" class="d-flex flex-wrap border rounded p-2 bg-light"></div>
                    </div>

                    <div class="mt-5 d-flex flex-column flex-md-row align-items-center justify-content-between">
                        <button type="submit" class="btn btn-primary btn-save shadow mb-3 mb-md-0">
                            Зберегти
                        </button>
                        <a href="{% url 'bicycle_storage_list' %}" class="btn btn-link text-muted">
                            ← До списку зберігання
                        </a>
                    </div>
                </form>
            </div>
            
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com"></script>
<script src="https://code.jquery.com"></script>

<script type="text/javascript">
// Зберігаємо вашу AJAX та Autocomplete логіку без змін
function id2name(){
    $.ajax({
        type: "GET",
        url: "/client/lookup/byid/",
        data: { client_id: $("#id_client").val() },
        dataType: "json",
        success:function(msg){
            $.each(msg,function(index,item){
                $("#id_client").val(item)    
            });
        }
    });      
}

$(document).ready(function() {
    // Стилізуємо всі input автоматично класом bootstrap
    $('#django-form-wrapper input, #django-form-wrapper select, #django-form-wrapper textarea').addClass('form-control');

    $('#id_client').focus();
    
    $( "#id_client" ).autocomplete({
        source: function( request, response ) {
            $.ajax({
                type: "GET",
                url: "/client/lookup",
                data: { query: $("#id_client").val() },
                dataType: "json",
                success: function( data ) {
                    response( $.map( data, function( item ) {
                        return {
                            label: item.pk + ": [" + item.fields.forumname + "] "+ item.fields.name,
                            value: item.fields.name,
                            sale: item.fields.sale,
                            pk_id: item.pk,
                        }
                    }));                                
                }
            })
        },
        minLength: 3,
        select: function( event, ui ) {
            $('#id_client').val(ui.item.pk_id);
            $(this).attr('c_id', ui.item.pk_id)
            $('#id_sale').val(ui.item.sale);
        }
    });

    if ($("#id_client").val() != '') {
        $("#id_client").attr('c_id', $("#id_client").val());
        id2name();
    }
    
    $("#UserEnter").submit(function() {
        if ($("#id_price").val()) {
            $("#id_client").val($("#id_client").attr('c_id'));
            return true;
        }
        $("#id_price").after("<b class='text-danger d-block mt-1'>Введіть суму!</b>");
        return false;
    });

    // Прев'ю фото
    function previewImages() {
        var $preview = $('#preview').empty();
        if (this.files) $.each(this.files, function(i, file) {
            if (!/\.(jpe?g|png|gif)$/i.test(file.name)) return;
            var reader = new FileReader();
            $(reader).on("load", function() {
                $preview.append($("<img/>", {src:this.result}));
            });
            reader.readAsDataURL(file);
        });
    }
    $('#file-input').on("change", previewImages);

    // Оновлення імені файлу в кастомному інпуті Bootstrap
    $('.custom-file-input').on('change', function() {
        let fileName = $(this).val().split('\\').pop();
        $(this).next('.custom-file-label').addClass("selected").html(fileName || "Вибрано декілька файлів");
    });
});
</script>

</body>
</html>

$(function() {
    // Multiple images preview in browser
    var imagesPreview = function(input, placeToInsertImagePreview) {

        if (input.files) {
            var filesAmount = input.files.length;

            for (i = 0; i < filesAmount; i++) {
                var reader = new FileReader();

                reader.onload = function(event) {
                    $($.parseHTML('<img width="360px">')).attr('src', event.target.result).appendTo(placeToInsertImagePreview);
                }

                reader.readAsDataURL(input.files[i]);
            }
        }

    };

    $('#gallery-photo-add').on('change', function() {
        imagesPreview(this, 'div.gallery');
    });
});
